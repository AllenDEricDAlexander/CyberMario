spring:
  ai:
    dashscope:
      api-key: test-api-key
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 30s
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:cyber_mario_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: CyberMarioTestHikariPool
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  jackson:
    # 测试环境保持与主配置一致，覆盖接口 JSON 的序列化和反序列化约束。
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    parser:
      allow-single-quotes: true
      allow-unquoted-control-chars: true
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  health:
    redis:
      enabled: false

server:
  shutdown: graceful

info:
  app:
    name: ${spring.application.name:Mario}
    description: Cyber Mario is a chat bot

mario:
  rbac:
    cache:
      enabled: false
  security:
    jwt:
      issuer: CyberMarioTest
      secret: CyberMarioTestJwtSecretForRbac1PermissionsAtLeast32Bytes
      access-token-ttl: PT5M
      refresh-token-ttl: PT1H

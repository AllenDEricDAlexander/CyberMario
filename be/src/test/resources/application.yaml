spring:
  ai:
    dashscope:
      api-key: test-api-key
  datasource:
    url: jdbc:h2:mem:cyber_mario_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  health:
    redis:
      enabled: false

info:
  app:
    name: ${spring.application.name:Mario}
    description: Cyber Mario is a chat bot

mario:
  rbac:
    cache:
      enabled: false
  security:
    jwt:
      issuer: CyberMarioTest
      secret: CyberMarioTestJwtSecretForRbac1PermissionsAtLeast32Bytes
      access-token-ttl: PT5M
      refresh-token-ttl: PT1H

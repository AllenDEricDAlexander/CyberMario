spring:
  ai:
    dashscope:
      api-key: test-api-key
    vectorstore:
      type: none
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 30s
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:cyber_mario_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: CyberMarioTestHikariPool
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  jackson:
    # 测试环境保持与主配置一致，覆盖接口 JSON 的序列化和反序列化约束。
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    parser:
      allow-single-quotes: true
      allow-unquoted-control-chars: true
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  health:
    redis:
      enabled: false

server:
  shutdown: graceful

info:
  app:
    name: ${spring.application.name:Mario}
    description: Cyber Mario is a chat bot

agent:
  mcp:
    runtime:
      enabled: false

mario:
  rag:
    storage:
      local-root: ${java.io.tmpdir}/cyber-mario-rag-test
    retrieval:
      default-top-k: 6
      default-similarity-threshold: 0.55
      default-search-mode: HYBRID
      candidate-top-k: 50
      context-top-k: 6
      vector-weight: 0.65
      keyword-weight: 0.35
      chunk-size: 800
      chunk-overlap: 120
      rerank-enabled: false
      rerank-model: qwen3-rerank
      rerank-base-url: https://dashscope.aliyuncs.com/compatible-api/v1
    model:
      chat-model: qwen-plus
      embedding-model: text-embedding-v4
      embedding-dimension: 1024
  rbac:
    resource-sync:
      enabled: false
    cache:
      enabled: false
  security:
    jwt:
      issuer: CyberMarioTest
      secret: CyberMarioTestJwtSecretForRbac1PermissionsAtLeast32Bytes
      access-token-ttl: PT5M
      refresh-token-ttl: PT1H

spring:
  application:
    name: Mario
  main:
    web-application-type: reactive
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cyber_mario}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:HomeLab666}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:CyberMarioHikariPool}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:17}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      auto-commit: ${DB_POOL_AUTO_COMMIT:true}
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:HomeLab666}
      database: 1
      timeout: ${REDIS_TIMEOUT:3s}
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 对空数据库自动创建基准版本（避免首次启动失败）
    baseline-on-migrate: true
    # 启动时校验脚本完整性（**禁止修改历史脚本**）
    validate-on-migrate: true
    # 禁用危险命令 flyway.clean()（防止误删生产数据
    clean-disabled: true
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
    alibaba:
      toolcalling:
        duckduckgo:
          enabled: true
          api-key: ${SEARCH_API_KEY:}
        wikipedia:
          enabled: true
          language: en
          limit: 10


server:
  port: ${SERVER_PORT:28080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name:Mario}
    description: Cyber Mario is a chat bot

mario:
  security:
    jwt:
      issuer: ${JWT_ISSUER:CyberMario}
      secret: ${JWT_SECRET:CyberMarioLocalJwtSecretForRbac1PermissionsAtLeast32Bytes}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT30M}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P14D}
  rbac:
    bootstrap:
      admin:
        enabled: ${RBAC_BOOTSTRAP_ADMIN_ENABLED:true}
        username: ${RBAC_BOOTSTRAP_ADMIN_USERNAME:admin}
        password: ${RBAC_BOOTSTRAP_ADMIN_PASSWORD:HomeLab666@2026}
        require-password-change: ${RBAC_BOOTSTRAP_ADMIN_REQUIRE_PASSWORD_CHANGE:false}
    cache:
      enabled: ${RBAC_CACHE_ENABLED:true}
      api-rules-ttl: ${RBAC_API_RULES_CACHE_TTL:PT10M}
      user-permissions-ttl: ${RBAC_USER_PERMISSIONS_CACHE_TTL:PT10M}
      double-delete-delay: ${RBAC_CACHE_DOUBLE_DELETE_DELAY:PT0.8S}
      bloom-expected-insertions: ${RBAC_CACHE_BLOOM_EXPECTED_INSERTIONS:100000}
      bloom-false-positive-probability: ${RBAC_CACHE_BLOOM_FALSE_POSITIVE_PROBABILITY:0.01}

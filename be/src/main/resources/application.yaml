spring:
  threads:
    virtual:
      enabled: true
  application:
    name: Mario
  main:
    web-application-type: reactive
  lifecycle:
    # 停机时每个生命周期阶段最多等待 30 秒，避免请求或后台任务被强制中断。
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}
  task:
    execution:
      shutdown:
        # 应用退出时等待 Spring 管理的任务执行器完成已接收任务。
        await-termination: ${SPRING_TASK_EXECUTION_SHUTDOWN_AWAIT_TERMINATION:true}
        await-termination-period: ${SPRING_TASK_EXECUTION_SHUTDOWN_AWAIT_TERMINATION_PERIOD:30s}
    scheduling:
      shutdown:
        # 应用退出时等待 Spring 管理的调度任务完成当前执行。
        await-termination: ${SPRING_TASK_SCHEDULING_SHUTDOWN_AWAIT_TERMINATION:true}
        await-termination-period: ${SPRING_TASK_SCHEDULING_SHUTDOWN_AWAIT_TERMINATION_PERIOD:30s}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cyber_mario}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:CyberMarioHikariPool}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:17}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      auto-commit: ${DB_POOL_AUTO_COMMIT:true}
  jackson:
    # 后端接口统一忽略空值并使用 UTC，避免与数据库时间语义不一致。
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      # 兼容前端或第三方请求中新增的字段，避免 DTO 演进导致反序列化失败。
      fail-on-unknown-properties: false
    parser:
      # 兼容部分调用方的宽松 JSON 输入；仅放宽解析，不改变响应结构。
      allow-single-quotes: true
      allow-unquoted-control-chars: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:HomeLab666}
      database: 1
      timeout: ${REDIS_TIMEOUT:3s}
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/postgresql
    # 对空数据库自动创建基准版本（避免首次启动失败）
    baseline-on-migrate: true
    # 启动时校验脚本完整性（**禁止修改历史脚本**）
    validate-on-migrate: true
    # 禁用危险命令 flyway.clean()（防止误删生产数据
    clean-disabled: true
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${AI_CHAT_MODEL:qwen3.7-plus}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      type: ${AI_VECTORSTORE_TYPE:pgvector}
      pgvector:
        initialize-schema: false
        table-name: rag_vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${AI_EMBEDDING_DIMENSION:1024}
    alibaba:
      toolcalling:
        duckduckgo:
          enabled: true
          api-key: ${SERPAPI_KEY:${SEARCH_API_KEY:}}
        bravesearch:
          enabled: false
          api-key: ${BRAVE_SEARCH_API_KEY:}
        wikipedia:
          enabled: false
          language: en
          limit: 10


server:
  port: ${SERVER_PORT:28080}
  # 收到 SIGTERM 时停止接收新请求，并等待已进入 WebFlux 的请求完成。
  shutdown: graceful

im:
  realtime:
    dispatcher:
      enabled: ${IM_REALTIME_DISPATCHER_ENABLED:true}
      max-attempts: ${IM_REALTIME_DISPATCHER_MAX_ATTEMPTS:3}
      retry-base-delay-ms: ${IM_REALTIME_DISPATCHER_RETRY_BASE_DELAY_MS:1000}
      runner:
        enabled: ${IM_REALTIME_DISPATCHER_RUNNER_ENABLED:true}
        batch-size: ${IM_REALTIME_DISPATCHER_BATCH_SIZE:100}
        initial-delay-ms: ${IM_REALTIME_DISPATCHER_INITIAL_DELAY_MS:1000}
        fixed-delay-ms: ${IM_REALTIME_DISPATCHER_FIXED_DELAY_MS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN

info:
  app:
    name: ${spring.application.name:Mario}
    description: Cyber Mario is a chat bot

clocktower:
  agent-player:
    enabled: ${CLOCKTOWER_AGENT_PLAYER_ENABLED:true}
  game-actions:
    enabled: ${CLOCKTOWER_GAME_ACTIONS_ENABLED:true}
  public-mic:
    enabled: ${CLOCKTOWER_PUBLIC_MIC_ENABLED:true}
    round-robin-turn-seconds: ${CLOCKTOWER_PUBLIC_MIC_ROUND_ROBIN_TURN_SECONDS:45}
    grab-mic-total-seconds: ${CLOCKTOWER_PUBLIC_MIC_GRAB_MIC_TOTAL_SECONDS:300}
    grab-mic-hold-seconds: ${CLOCKTOWER_PUBLIC_MIC_GRAB_MIC_HOLD_SECONDS:45}
  new-flow:
    enabled: ${CLOCKTOWER_NEW_FLOW_ENABLED:true}
  llm-agent:
    enabled: ${CLOCKTOWER_LLM_AGENT_ENABLED:false}
  agent:
    default-response-delay-ms: ${CLOCKTOWER_AGENT_DEFAULT_RESPONSE_DELAY_MS:800}
    worker:
      enabled: ${CLOCKTOWER_AGENT_WORKER_ENABLED:true}
      batch-size: ${CLOCKTOWER_AGENT_WORKER_BATCH_SIZE:10}
      max-attempts: ${CLOCKTOWER_AGENT_WORKER_MAX_ATTEMPTS:3}
      initial-delay-ms: ${CLOCKTOWER_AGENT_WORKER_INITIAL_DELAY_MS:1000}
      fixed-delay-ms: ${CLOCKTOWER_AGENT_WORKER_FIXED_DELAY_MS:1000}
      retry-delay-ms: ${CLOCKTOWER_AGENT_WORKER_RETRY_DELAY_MS:1000}
      runner:
        enabled: ${CLOCKTOWER_AGENT_WORKER_RUNNER_ENABLED:true}

agent:
  mcp:
    runtime:
      enabled: ${AGENT_MCP_RUNTIME_ENABLED:true}
      refresh:
        broadcast-enabled: ${AGENT_MCP_RUNTIME_REFRESH_BROADCAST_ENABLED:true}
        broadcast-topic: ${AGENT_MCP_RUNTIME_REFRESH_BROADCAST_TOPIC:agent:mcp:runtime:refresh}

mario:
  investment:
    # 生产订阅代码尚未配置时 planner 保持关闭；任务 runner 只消费已持久化的幂等任务。
    market-data-planner-enabled: ${INVESTMENT_MARKET_DATA_PLANNER_ENABLED:false}
    job:
      batch-size: ${INVESTMENT_JOB_BATCH_SIZE:10}
      lease-duration: ${INVESTMENT_JOB_LEASE_DURATION:PT30S}
      heartbeat-interval: ${INVESTMENT_JOB_HEARTBEAT_INTERVAL:PT10S}
      retry-base-delay: ${INVESTMENT_JOB_RETRY_BASE_DELAY:PT1S}
      retry-max-delay: ${INVESTMENT_JOB_RETRY_MAX_DELAY:PT5M}
      runner:
        enabled: ${INVESTMENT_JOB_RUNNER_ENABLED:true}
        initial-delay: ${INVESTMENT_JOB_RUNNER_INITIAL_DELAY:PT1S}
        poll-interval: ${INVESTMENT_JOB_RUNNER_POLL_INTERVAL:PT1S}
  nutrition:
    ai:
      model: ${NUTRITION_AI_MODEL:${AI_CHAT_MODEL:qwen3.7-plus}}
      recommendation:
        runner:
          enabled: ${NUTRITION_AI_RUNNER_ENABLED:true}
          initial-delay-ms: ${NUTRITION_AI_RUNNER_INITIAL_DELAY_MS:1000}
          fixed-delay-ms: ${NUTRITION_AI_RUNNER_FIXED_DELAY_MS:5000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:CyberMario}
      secret: ${JWT_SECRET:CyberMarioLocalJwtSecretForRbac1PermissionsAtLeast32Bytes}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT30M}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P14D}
    browser-cookie:
      secure: ${BROWSER_AUTH_COOKIE_SECURE:true}
  rbac:
    resource-sync:
      enabled: ${RBAC_RESOURCE_SYNC_ENABLED:true}
    bootstrap:
      admin:
        enabled: ${RBAC_BOOTSTRAP_ADMIN_ENABLED:true}
        username: ${RBAC_BOOTSTRAP_ADMIN_USERNAME:admin}
        password: ${RBAC_BOOTSTRAP_ADMIN_PASSWORD:HomeLab666@2026}
        require-password-change: ${RBAC_BOOTSTRAP_ADMIN_REQUIRE_PASSWORD_CHANGE:false}
    role-presets:
      enabled: ${RBAC_ROLE_PRESETS_ENABLED:true}
      sync-mode: ${RBAC_ROLE_PRESETS_SYNC_MODE:CREATE_ONLY}
    cache:
      enabled: ${RBAC_CACHE_ENABLED:true}
      api-rules-ttl: ${RBAC_API_RULES_CACHE_TTL:PT10M}
      user-permissions-ttl: ${RBAC_USER_PERMISSIONS_CACHE_TTL:PT10M}
      double-delete-delay: ${RBAC_CACHE_DOUBLE_DELETE_DELAY:PT0.8S}
      local-ttl: ${RBAC_CACHE_LOCAL_TTL:PT30S}
      local-maximum-size: ${RBAC_CACHE_LOCAL_MAXIMUM_SIZE:10000}
      bloom-expected-insertions: ${RBAC_CACHE_BLOOM_EXPECTED_INSERTIONS:100000}
      bloom-false-positive-probability: ${RBAC_CACHE_BLOOM_FALSE_POSITIVE_PROBABILITY:0.01}
      broadcast-enabled: ${RBAC_CACHE_BROADCAST_ENABLED:true}
      broadcast-topic: ${RBAC_CACHE_BROADCAST_TOPIC:rbac:cache:evict}
  im:
    platform:
      user-role-backfill:
        enabled: ${IM_PLATFORM_USER_ROLE_BACKFILL_ENABLED:true}
  rag:
    storage:
      type: ${RAG_STORAGE_TYPE:LOCAL}
      local-root: ${RAG_LOCAL_STORAGE_ROOT:${user.home}/.cyber-mario/rag-files}
    retrieval:
      default-top-k: ${RAG_DEFAULT_TOP_K:6}
      default-similarity-threshold: ${RAG_DEFAULT_SIMILARITY_THRESHOLD:0.55}
      default-search-mode: ${RAG_DEFAULT_SEARCH_MODE:HYBRID}
      candidate-top-k: ${RAG_CANDIDATE_TOP_K:50}
      context-top-k: ${RAG_CONTEXT_TOP_K:6}
      vector-weight: ${RAG_VECTOR_WEIGHT:0.65}
      keyword-weight: ${RAG_KEYWORD_WEIGHT:0.35}
      chunk-size: ${RAG_CHUNK_SIZE:800}
      chunk-overlap: ${RAG_CHUNK_OVERLAP:120}
      rerank-enabled: ${RAG_RERANK_ENABLED:false}
      rerank-model: ${RAG_RERANK_MODEL:qwen3-rerank}
      rerank-base-url: ${RAG_RERANK_BASE_URL:https://dashscope.aliyuncs.com/compatible-api/v1}
    model:
      chat-model: ${AI_CHAT_MODEL:qwen3.7-plus}
      embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
      embedding-dimension: ${AI_EMBEDDING_DIMENSION:1024}
  agent:
    soul:
      evolution-enabled: ${AGENT_SOUL_EVOLUTION_ENABLED:true}
      evolution-provider: ${AGENT_SOUL_EVOLUTION_PROVIDER:DASHSCOPE}
      evolution-model: ${AGENT_SOUL_EVOLUTION_MODEL:qwen3.6-plus-2026-04-02}
      evolution-temperature: ${AGENT_SOUL_EVOLUTION_TEMPERATURE:0.2}
      evolution-max-tokens: ${AGENT_SOUL_EVOLUTION_MAX_TOKENS:4096}
    memory:
      checkpointer:
        enabled: ${AGENT_MEMORY_CHECKPOINTER_ENABLED:true}
        # checkpoint 表由 Flyway V23 管理，避免依赖启动时重复执行非幂等索引 DDL。
        create-tables: ${AGENT_MEMORY_CHECKPOINTER_CREATE_TABLES:false}
        drop-tables-first: ${AGENT_MEMORY_CHECKPOINTER_DROP_TABLES_FIRST:false}

spring:
  application:
    name: Mario
  main:
    web-application-type: reactive
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cyber_mario}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:HomeLab666}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
    alibaba:
      toolcalling:
        duckduckgo:
          enabled: true
          api-key: ${SEARCH_API_KEY:}
        wikipedia:
          enabled: true
          language: en
          limit: 10


server:
  port: ${SERVER_PORT:28080}

mario:
  security:
    jwt:
      issuer: ${JWT_ISSUER:CyberMario}
      secret: ${JWT_SECRET:CyberMarioLocalJwtSecretForRbac1PermissionsAtLeast32Bytes}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT30M}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P14D}

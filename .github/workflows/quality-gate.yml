name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      auto_db_schema:
        required: true
        type: string
      auto_redis_host:
        required: true
        type: string
      auto_redis_port:
        required: true
        type: string
      auto_redis_database:
        required: true
        type: string
    secrets:
      AUTO_DB_URL:
        required: true
      AUTO_DB_USERNAME:
        required: true
      AUTO_DB_PASSWORD:
        required: true
      AUTO_REDIS_PASSWORD:
        required: true
      AUTO_JWT_SECRET:
        required: true
      AUTO_ADMIN_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        working-directory: be
        run: ./mvnw -Dmaven.build.cache.enabled=false test

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install frontend dependencies
        working-directory: fe
        run: bun install --frozen-lockfile
      - name: Lint frontend
        working-directory: fe
        run: bun run lint
      - name: Typecheck frontend
        working-directory: fe
        run: bun run typecheck
      - name: Test frontend
        working-directory: fe
        run: bun run test
      - name: Build frontend
        working-directory: fe
        run: bun run build

  auth-playwright:
    name: Auth Playwright
    needs:
      - backend-check
      - frontend-check
    runs-on: ubuntu-latest
    concurrency:
      group: cybermario-auto-quality
      cancel-in-progress: false
    env:
      CI: 'true'
      AUTO_CLEANUP_ALLOWED: 'true'
      AUTO_DB_URL: ${{ secrets.AUTO_DB_URL }}
      AUTO_DB_USERNAME: ${{ secrets.AUTO_DB_USERNAME }}
      AUTO_DB_PASSWORD: ${{ secrets.AUTO_DB_PASSWORD }}
      AUTO_DB_SCHEMA: ${{ inputs.auto_db_schema || vars.AUTO_DB_SCHEMA }}
      AUTO_REDIS_HOST: ${{ inputs.auto_redis_host || vars.AUTO_REDIS_HOST }}
      AUTO_REDIS_PORT: ${{ inputs.auto_redis_port || vars.AUTO_REDIS_PORT }}
      AUTO_REDIS_PASSWORD: ${{ secrets.AUTO_REDIS_PASSWORD }}
      AUTO_REDIS_DATABASE: ${{ inputs.auto_redis_database || vars.AUTO_REDIS_DATABASE }}
      AUTO_JWT_SECRET: ${{ secrets.AUTO_JWT_SECRET }}
      AUTO_ADMIN_PASSWORD: ${{ secrets.AUTO_ADMIN_PASSWORD }}
      AUTO_BACKEND_PORT: '28081'
      AUTO_FRONTEND_PORT: '5174'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install frontend dependencies
        working-directory: fe
        run: bun install --frozen-lockfile
      - name: Install quality dependencies
        working-directory: quality
        run: bun install --frozen-lockfile
      - name: Install Chromium
        working-directory: quality
        run: bunx playwright install --with-deps chromium
      - name: Test quality infrastructure
        working-directory: quality
        run: bun run test
      - name: Typecheck quality project
        working-directory: quality
        run: bun run typecheck
      - name: Run Auth Playwright gate
        working-directory: quality
        run: bun run test:auth
      - name: Upload Auth diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            quality/artifacts/process-logs/
            quality/playwright-report/
            quality/test-results/

  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - backend-check
      - frontend-check
      - auth-playwright
    runs-on: ubuntu-latest
    steps:
      - name: Require every quality check
        shell: bash
        run: |
          test "${{ needs.backend-check.result }}" = "success"
          test "${{ needs.frontend-check.result }}" = "success"
          test "${{ needs.auth-playwright.result }}" = "success"
